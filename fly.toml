app = "bioma"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  PHX_HOST = "bioma.fly.dev"
  PORT = "8080"
  MIX_ENV = "dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
